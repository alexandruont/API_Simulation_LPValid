services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: plates
      POSTGRES_PASSWORD: plates
      POSTGRES_DB: platesdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://plates:plates@db:5432/platesdb
    ports:
      - "8001:8000"
    depends_on:
      - db

volumes:
  pgdata: